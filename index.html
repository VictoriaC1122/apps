<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Victoria Cheng Apps</title>
    <meta
      name="description"
      content="A bilingual app showcase website for Victoria Cheng, featuring independently designed and developed iOS apps."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Noto+Serif+TC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#appsRail">Skip to apps</a>
    <div class="page-shell">
      <header class="site-header">
        <nav class="topbar" aria-label="Primary">
          <a class="brand" href="#top" data-i18n="brand">Victoria Cheng Apps</a>
          <div class="topnav-links">
            <a href="#appsRail" data-i18n="navApps">Apps</a>
            <a href="https://victoriac1122.github.io/" target="_blank" rel="noreferrer" data-i18n="navMainSite">Main Site</a>
            <a href="https://github.com/VictoriaC1122/apps" target="_blank" rel="noreferrer" data-i18n="navGithub">GitHub</a>
          </div>
          <div class="topbar-actions">
            <button class="lang-toggle" id="langToggle" type="button" aria-live="polite" aria-label="Switch language">
              EN
            </button>
          </div>
        </nav>
      </header>

      <main>
        <section class="hero-block" id="top">
          <p class="section-kicker" data-i18n="sectionKicker">Featured Apps</p>
          <h1 class="page-title" data-i18n="heroTitle">我開發的 App 們</h1>
          <div class="title-underline"></div>
          <p class="hero-text" data-i18n="heroBody">
            這是一個專門收錄 Victoria Cheng 個人開發作品的雙語頁面，集中展示 app 圖示、下載入口與作品亮點。
          </p>
          <div class="hero-stats" id="heroStats" aria-label="App summary"></div>
        </section>

        <section class="showcase-section" aria-labelledby="showcaseTitle">
          <div class="showcase-header">
            <div>
              <p class="section-kicker" data-i18n="carouselKicker">Scrollable Showcase</p>
              <h2 class="section-title" id="showcaseTitle" data-i18n="carouselTitle">App Lineup</h2>
            </div>
            <div class="showcase-controls">
              <button class="carousel-button" id="scrollPrev" type="button" aria-label="Scroll left">&#8592;</button>
              <button class="carousel-button" id="scrollNext" type="button" aria-label="Scroll right">&#8594;</button>
            </div>
          </div>
          <div class="apps-rail" id="appsRail"></div>
        </section>
      </main>
    </div>

    <template id="appCardTemplate">
      <article class="app-card">
        <button class="app-card-inner app-detail-trigger" type="button">
          <div class="app-card-top">
            <img class="app-icon" alt="" />
            <div class="app-card-copy">
              <h3 class="app-title"></h3>
              <div class="status-row">
                <span class="status-pill">
                  <span class="status-dot" aria-hidden="true"></span>
                  <span class="status-text"></span>
                </span>
              </div>
              <p class="app-meta"></p>
            </div>
          </div>
          <p class="app-summary"></p>
          <div class="app-card-footer">
            <span class="app-open-hint" data-i18n="detailsHint">View details</span>
            <span class="app-chevron" aria-hidden="true">&#8594;</span>
          </div>
        </button>
      </article>
    </template>

    <div class="modal-backdrop" id="modalBackdrop" hidden>
      <section class="app-modal" id="appModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="modal-close" id="modalClose" type="button" aria-label="Close modal">&times;</button>
        <div class="modal-hero">
          <div class="modal-hero-panel">
            <img class="modal-icon" id="modalIcon" alt="" />
            <div class="modal-hero-copy">
              <div class="status-row">
                <span class="status-pill" id="modalStatusPill">
                  <span class="status-dot" aria-hidden="true"></span>
                  <span class="status-text" id="modalStatusText"></span>
                </span>
              </div>
              <h2 class="modal-title" id="modalTitle"></h2>
              <p class="modal-meta" id="modalMeta"></p>
            </div>
          </div>
        </div>
        <div class="modal-content">
          <section class="modal-section">
            <h3 class="modal-section-title" data-i18n="overviewTitle">Overview</h3>
            <p class="modal-body" id="modalDescription"></p>
          </section>
          <section class="modal-section">
            <h3 class="modal-section-title" data-i18n="highlightTitle">Project Highlight</h3>
            <p class="modal-body modal-body-strong" id="modalHighlight"></p>
          </section>
        </div>
        <div class="modal-actions">
          <a class="app-button primary-button" id="modalStoreButton" target="_blank" rel="noreferrer"></a>
        </div>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
